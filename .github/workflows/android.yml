name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      env:
        BUILDOZER_ALLOW_ROOT: 1
        ANDROID_HOME: /root/.buildozer/android/platform/android-sdk
        ANDROID_SDK_ROOT: /root/.buildozer/android/platform/android-sdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Accept Android licenses
        run: |
          echo "=== 设置许可证 ==="
          mkdir -p /root/.buildozer/android/platform/android-sdk/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" >> /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          echo "=== 许可证文件列表 ==="
          ls -la /root/.buildozer/android/platform/android-sdk/licenses/
          echo "=== 许可证内容 ==="
          cat /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Pre-install Android SDK components
        run: |
          echo "=== 检查 SDK 目录 ==="
          ls -la /root/.buildozer/android/platform/android-sdk/
          echo "=== 检查 build-tools ==="
          ls /root/.buildozer/android/platform/android-sdk/build-tools/ 2>/dev/null || echo "build-tools 目录不存在"
          echo "=== 检查 cmdline-tools ==="
          ls /root/.buildozer/android/platform/android-sdk/cmdline-tools/ 2>/dev/null || echo "cmdline-tools 目录不存在"

      - name: Build APK
        run: |
          cd mobile
          ln -s ../src .
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tailpicker-apk
          path: mobile/bin/*.apk
