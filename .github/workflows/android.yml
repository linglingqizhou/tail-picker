name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: 3.8

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            openjdk-11-jdk \
            autoconf \
            automake \
            build-essential \
            libssl-dev \
            libffi-dev \
            python3-dev \
            libtinfo5 \
            libncurses5 \
            gettext \
            m4 \
            unzip \
            zip \
            git \
            cmake \
            libncurses5-dev \
            libglib2.0-dev \
            libjni-dev \
            libncursesw5-dev \
            libtinfo-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            libpng-dev \
            libjpeg-dev

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Build APK
        run: |
          cd mobile
          ln -s ../src .
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tailpicker-apk
          path: mobile/bin/*.apk
